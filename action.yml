name: 'Sentori Scan'
description: 'MCP-focused AI agent security scanner with GitHub Code Scanning integration'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-path:
    description: 'Path to scan (relative to workspace root)'
    required: false
    default: '.'
  fail-on-critical:
    description: 'Exit with error if critical findings are detected (exit code 2)'
    required: false
    default: 'true'
  fail-on-high:
    description: 'Exit with error if high findings are detected (exit code 1)'
    required: false
    default: 'false'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning (requires `security-events: write` permission)'
    required: false
    default: 'false'
  sarif-file:
    description: 'Path to write the SARIF output file (must end with .sarif, used with upload-sarif)'
    required: false
    default: 'sentori-results.sarif'
  output-format:
    description: 'Console output format: pretty, json, or sarif'
    required: false
    default: 'pretty'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Sentori Scan
      id: scan
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.scan-path }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}
        FAIL_ON_CRITICAL: ${{ inputs.fail-on-critical }}
        FAIL_ON_HIGH: ${{ inputs.fail-on-high }}
        UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        SARIF_FILE: ${{ inputs.sarif-file }}
      run: |
        set +e

        if [ "$UPLOAD_SARIF" = "true" ]; then
          npx -y @nexylore/sentori@latest scan "$SCAN_PATH" --format sarif --output "$SARIF_FILE"
        elif [ "$OUTPUT_FORMAT" = "json" ]; then
          npx -y @nexylore/sentori@latest scan "$SCAN_PATH" --format json
        elif [ "$OUTPUT_FORMAT" = "sarif" ]; then
          npx -y @nexylore/sentori@latest scan "$SCAN_PATH" --format sarif
        else
          npx -y @nexylore/sentori@latest scan "$SCAN_PATH"
        fi
        SCAN_EXIT=$?

        # Exit code 2 = critical findings, 1 = high findings, 0 = clean
        if [ "$FAIL_ON_CRITICAL" = "true" ] && [ $SCAN_EXIT -eq 2 ]; then
          echo "::error::Sentori detected CRITICAL security findings."
          exit 2
        fi
        if [ "$FAIL_ON_HIGH" = "true" ] && [ $SCAN_EXIT -ge 1 ]; then
          echo "::error::Sentori detected HIGH security findings."
          exit 1
        fi

        exit 0

    - name: Upload SARIF to GitHub Code Scanning
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-file }}
        category: sentori
