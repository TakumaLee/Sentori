name: Sentori Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sentori:
    runs-on: ubuntu-latest
    name: Scan agent configs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Sentori
        uses: TakumaLee/Sentori@main
        with:
          scan-path: '.'
          fail-on-critical: 'true'
          upload-sarif: 'true'
